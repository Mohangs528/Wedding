<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruthi & Navya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    height:100vh;
    overflow:hidden;
    font-family:'Montserrat', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* Gold shimmer background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(120deg,
        transparent 40%,
        rgba(212,175,55,0.08),
        transparent 60%);
    animation:shimmer 8s linear infinite;
}

@keyframes shimmer{
    from{transform:translateX(-50%) rotate(0deg);}
    to{transform:translateX(0%) rotate(360deg);}
}

/* Main Card */
.card{
    position:relative;
    width:90%;
    max-width:420px;
    padding:50px 30px;
    border-radius:25px;
    background:#0d0d0d;
    border:1px solid rgba(212,175,55,0.4);
    box-shadow:0 0 40px rgba(212,175,55,0.2);
    text-align:center;
    overflow:hidden;
}

/* Gold top line animation */
.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:0%;
    height:3px;
    background:#d4af37;
    animation:lineGrow 2s ease forwards;
}

@keyframes lineGrow{
    to{width:100%;}
}

h1{
    font-family:'Playfair Display', serif;
    font-size:26px;
    color:#d4af37;
    letter-spacing:3px;
    margin-bottom:20px;
}

/* Animated names */
.names{
    font-size:28px;
    font-weight:500;
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 2s 1s forwards;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.message{
    margin-top:20px;
    font-size:15px;
    line-height:1.6;
    color:#ccc;
    opacity:0;
    animation:fadeIn 2s 2s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* Button */
button{
    margin-top:30px;
    padding:14px 35px;
    border-radius:30px;
    border:none;
    background:#d4af37;
    color:black;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.4s;
    opacity:0;
    animation:fadeIn 2s 3s forwards;
}

button:hover{
    background:white;
    transform:scale(1.05);
}

.final{
    margin-top:20px;
    font-size:16px;
    color:#d4af37;
    opacity:0;
    transition:0.8s;
}

.final.show{
    opacity:1;
}
</style>
</head>
<body>

<div class="card">
    <h1>HAPPY ANNIVERSARY</h1>

    <div class="names">
        Maruthi & Navya
    </div>

    <div class="message">
        A journey written in love.  
        A bond forged in trust.  
        A story that grows more beautiful with time.
    </div>

    <button onclick="reveal()">CELEBRATE LOVE</button>

    <div class="final" id="final">
        ✨ Forever. Always. Together. ✨
    </div>
</div>

<script>
function reveal(){
    document.getElementById("final").classList.add("show");

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love shine like gold forever.";
    let speech=new SpeechSynthesisUtterance(msg);
    speech.rate=0.95;
    speech.pitch=1;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
