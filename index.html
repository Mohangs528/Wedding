<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary Maruthi & Navya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#1a1a1a,#2c2c2c);
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* Golden Glow Animation */
@keyframes glow{
    0%{text-shadow:0 0 10px gold;}
    50%{text-shadow:0 0 25px goldenrod;}
    100%{text-shadow:0 0 10px gold;}
}

.container{
    padding:50px 20px;
    animation:fadeIn 2s ease-in;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-family:'Playfair Display', serif;
    font-size:50px;
    color:gold;
    animation:glow 3s infinite;
}

.names{
    font-size:28px;
    margin-top:10px;
    letter-spacing:2px;
}

.message{
    max-width:600px;
    margin:30px auto;
    font-size:20px;
    line-height:1.6;
}

/* Image */
.photo{
    margin-top:30px;
}

.photo img{
    width:260px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(255,215,0,0.4);
    transition:0.5s;
}

.photo img:hover{
    transform:scale(1.05);
}

/* Button */
button{
    margin-top:30px;
    padding:15px 35px;
    background:gold;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    color:black;
    transition:0.3s;
}

button:hover{
    background:white;
    transform:scale(1.1);
}

#surprise{
    display:none;
    margin-top:20px;
    font-size:22px;
    color:gold;
}
</style>
</head>
<body>

<div class="container">
    <h1>Happy Wedding Anniversary</h1>
    <div class="names">Maruthi ❤️ Navya</div>

    <div class="message">
        A beautiful journey, built with love, trust and laughter.
        May your bond shine brighter with every passing year.
        Wishing you endless happiness and golden memories together.
    </div>

    <div class="photo">
        <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57" alt="Couple">
    </div>

    <button onclick="showSurprise()">Click for Special Wish</button>

    <div id="surprise">
        💛 May your love story continue forever like a timeless classic 💛
    </div>
</div>

<script>
function showSurprise(){
    document.getElementById("surprise").style.display="block";

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love shine like gold forever.";
    let speech=new SpeechSynthesisUtterance(msg);
    speech.rate=0.9;
    speech.pitch=1;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
