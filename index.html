<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruthi ❤️ Navya Anniversary</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    text-align:center;
}

.card{
    background:rgba(255,255,255,0.15);
    padding:30px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    max-width:400px;
    width:90%;
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:45px;
    margin:0;
}

.names{
    font-size:24px;
    margin:10px 0 20px;
}

/* Working Photo */
.photo img{
    width:220px;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    border:4px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.6);
    transition:0.4s;
}

.photo img:hover{
    transform:scale(1.05);
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4e73;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff4e73;
    color:white;
}

#message{
    margin-top:15px;
    display:none;
}
</style>
</head>
<body>

<div class="card">
    <h1>Happy Wedding Anniversary</h1>
    <div class="names">Maruthi ❤️ Navya</div>

    <div class="photo">
        <!-- Working public image -->
        <img src="https://picsum.photos/400/500" alt="Couple Photo">
    </div>

    <button onclick="wish()">Celebrate Love</button>

    <div id="message">
        💖 May your love grow stronger every year 💖
    </div>
</div>

<script>
function wish(){
    document.getElementById("message").style.display="block";

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love grow stronger every year.";
    let speech=new SpeechSynthesisUtterance(msg);
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
