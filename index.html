<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruthi & Navya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Montserrat', sans-serif;
    color:white;
}

/* Full screen luxury background */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    animation:zoomSlow 20s ease-in-out infinite alternate;
}

@keyframes zoomSlow{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

/* Center content */
.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
    max-width:500px;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translate(-50%,-45%);}
    to{opacity:1; transform:translate(-50%,-50%);}
}

h1{
    font-family:'Playfair Display', serif;
    font-size:32px;
    letter-spacing:4px;
    color:#d4af37;
}

.names{
    margin-top:15px;
    font-size:28px;
    font-weight:500;
    letter-spacing:2px;
}

.gold-line{
    width:70px;
    height:2px;
    background:#d4af37;
    margin:20px auto;
}

.message{
    font-size:15px;
    line-height:1.7;
    color:#e0e0e0;
}

button{
    margin-top:30px;
    padding:14px 35px;
    border-radius:30px;
    border:1px solid #d4af37;
    background:transparent;
    color:#d4af37;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    background:#d4af37;
    color:black;
}

.final{
    margin-top:20px;
    font-size:16px;
    color:#d4af37;
    opacity:0;
    transition:1s;
}

.final.show{
    opacity:1;
}
</style>
</head>
<body>

<div class="background"></div>

<div class="content">
    <h1>HAPPY WEDDING ANNIVERSARY</h1>

    <div class="names">Maruthi & Navya</div>

    <div class="gold-line"></div>

    <div class="message">
        A love that grows stronger with time.  
        A bond that shines brighter than gold.  
        May your journey together remain timeless and beautiful.
    </div>

    <button onclick="celebrate()">CELEBRATE</button>

    <div class="final" id="final">
        ✨ Forever. Always. Together. ✨
    </div>
</div>

<script>
function celebrate(){
    document.getElementById("final").classList.add("show");

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love shine like gold forever.";
    let speech=new SpeechSynthesisUtterance(msg);
    speech.rate=0.95;
    speech.pitch=1;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
