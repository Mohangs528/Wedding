<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruthi ❤️ Navya</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat', sans-serif;
    background:#0f0f0f;
    overflow:hidden;
    color:white;
}

/* Background animated glow */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 30% 30%, #ff4e73, transparent 40%),
               radial-gradient(circle at 70% 70%, #6a11cb, transparent 40%);
    animation:moveBg 8s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes moveBg{
    from{filter:hue-rotate(0deg);}
    to{filter:hue-rotate(60deg);}
}

/* Center Content */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
}

/* Cinematic intro text */
.intro{
    font-size:22px;
    letter-spacing:3px;
    opacity:0;
    animation:fadeIn 3s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* Names */
.names{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    margin:20px 0;
    opacity:0;
    animation:fadeIn 3s 2s forwards;
}

/* Message */
.message{
    font-size:20px;
    max-width:600px;
    margin:20px auto;
    opacity:0;
    animation:fadeIn 3s 4s forwards;
}

/* Button */
button{
    margin-top:30px;
    padding:14px 40px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff4e73,#6a11cb);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.4s;
    opacity:0;
    animation:fadeIn 3s 6s forwards;
}

button:hover{
    transform:scale(1.1);
}

/* Final Reveal */
.final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    opacity:0;
    visibility:hidden;
    transition:1s;
}

.final.show{
    opacity:1;
    visibility:visible;
}

.final h1{
    font-family:'Great Vibes', cursive;
    font-size:70px;
}

.final p{
    margin-top:20px;
    font-size:22px;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">
    <div class="intro">A BEAUTIFUL JOURNEY OF LOVE</div>
    <div class="names">Maruthi ❤️ Navya</div>
    <div class="message">
        Two souls. One destiny. A bond that grows stronger with time.
        Today we celebrate not just years, but memories, laughter and endless love.
    </div>
    <button onclick="reveal()">Celebrate Love</button>
</div>

<div class="final" id="final">
    <h1>Happy Wedding Anniversary</h1>
    <p>May your love shine forever ✨</p>
</div>

<script>
function reveal(){
    document.getElementById("final").classList.add("show");

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love story continue forever.";
    let speech=new SpeechSynthesisUtterance(msg);
    speech.rate=0.95;
    speech.pitch=1;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
