<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maruthi & Navya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Montserrat', sans-serif;
    color:white;
}

/* Background */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)),
        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-position:center;
    animation:zoomSlow 20s ease-in-out infinite alternate;
}

@keyframes zoomSlow{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}

/* Main Content */
.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
    max-width:500px;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translate(-50%,-45%);}
    to{opacity:1; transform:translate(-50%,-50%);}
}

h1{
    font-family:'Playfair Display', serif;
    font-size:30px;
    letter-spacing:4px;
    color:#d4af37;
}

.names{
    margin-top:15px;
    font-size:26px;
    letter-spacing:2px;
}

.gold-line{
    width:70px;
    height:2px;
    background:#d4af37;
    margin:20px auto;
}

button{
    margin-top:30px;
    padding:14px 35px;
    border-radius:30px;
    border:1px solid #d4af37;
    background:transparent;
    color:#d4af37;
    font-weight:600;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    background:#d4af37;
    color:black;
}

/* Reveal Photo Overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:1s;
}

.overlay.show{
    opacity:1;
    visibility:visible;
}

.photo-box{
    text-align:center;
    animation:zoomIn 1s ease forwards;
}

@keyframes zoomIn{
    from{transform:scale(0.7); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

.photo-box img{
    width:80vw;
    max-width:400px;
    border-radius:20px;
    border:3px solid #d4af37;
    box-shadow:0 0 40px rgba(212,175,55,0.6);
}

.photo-box h2{
    margin-top:20px;
    font-family:'Playfair Display', serif;
    color:#d4af37;
}
</style>
</head>
<body>

<div class="background"></div>

<div class="content">
    <h1>HAPPY WEDDING ANNIVERSARY</h1>
    <div class="names">Maruthi & Navya</div>
    <div class="gold-line"></div>
    <button onclick="celebrate()">CELEBRATE</button>
</div>

<!-- Photo Reveal -->
<div class="overlay" id="overlay">
    <div class="photo-box">
        <img src="https://picsum.photos/600/800" alt="Couple Photo">
        <h2>Forever. Always. Together.</h2>
    </div>
</div>

<script>
function celebrate(){

    document.getElementById("overlay").classList.add("show");

    let msg="Happy Wedding Anniversary Maruthi and Navya. May your love shine brighter with every passing year. Forever and always together.";
    let speech=new SpeechSynthesisUtterance(msg);
    speech.rate=0.95;
    speech.pitch=1;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
